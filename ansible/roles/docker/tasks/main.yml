---
# =============================================================================
# Role: docker
# Instala Docker Engine e Cosign no Ubuntu 22.04
# Reutilizavel em qualquer EC2 que precise de Docker
# =============================================================================

# -----------------------------------------------------------------------------
# Pre-requisitos
# -----------------------------------------------------------------------------

- name: Instalar dependencias para o repositorio Docker
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - unzip
    state: present
    update_cache: true

# -----------------------------------------------------------------------------
# Docker Engine
# -----------------------------------------------------------------------------

- name: Criar directorio para chaves APT
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Adicionar chave GPG oficial do Docker
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
      gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    executable: /bin/bash
    creates: /etc/apt/keyrings/docker.gpg

- name: Adicionar repositorio oficial Docker
  ansible.builtin.shell: |
    set -o pipefail
    echo \
      "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
      https://download.docker.com/linux/ubuntu \
      $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
      tee /etc/apt/sources.list.d/docker.list > /dev/null
  args:
    executable: /bin/bash
    creates: /etc/apt/sources.list.d/docker.list

- name: Instalar Docker Engine
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Garantir que o servico Docker esta enabled e running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Adicionar utilizador ubuntu ao grupo docker
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true

# -----------------------------------------------------------------------------
# AWS CLI v2
# -----------------------------------------------------------------------------

- name: Verificar se AWS CLI ja esta instalado
  ansible.builtin.command: aws --version
  register: awscli_check
  failed_when: false
  changed_when: false

- name: Instalar AWS CLI v2
  when: awscli_check.rc != 0
  block:
    - name: Download AWS CLI v2
      ansible.builtin.get_url:
        url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        dest: /tmp/awscli.zip
        mode: "0644"

    - name: Descomprimir AWS CLI
      ansible.builtin.unarchive:
        src: /tmp/awscli.zip
        dest: /tmp/
        remote_src: true

    - name: Instalar AWS CLI
      ansible.builtin.command: /tmp/aws/install
      changed_when: true

    - name: Limpar ficheiros temporarios
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/awscli.zip
        - /tmp/aws

# -----------------------------------------------------------------------------
# Checkov
# -----------------------------------------------------------------------------

- name: Verificar se Checkov ja esta instalado
  ansible.builtin.command: checkov --version
  register: checkov_check
  failed_when: false
  changed_when: false

- name: Instalar Python3 pip e venv
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-venv
    state: present
  when: checkov_check.rc != 0

- name: Instalar Checkov em venv isolado
  ansible.builtin.pip:
    name: checkov=={{ checkov_version }}
    virtualenv: /opt/checkov-venv
    virtualenv_command: python3 -m venv
  when: checkov_check.rc != 0

- name: Criar symlink Checkov em /usr/local/bin
  ansible.builtin.file:
    src: /opt/checkov-venv/bin/checkov
    dest: /usr/local/bin/checkov
    state: link
  when: checkov_check.rc != 0

# -----------------------------------------------------------------------------
# Cosign
# -----------------------------------------------------------------------------

- name: Verificar se Cosign ja esta instalado
  ansible.builtin.command: cosign version
  register: cosign_check
  failed_when: false
  changed_when: false

- name: Instalar Cosign
  when: cosign_check.rc != 0
  block:
    - name: Download binario Cosign
      ansible.builtin.get_url:
        url: "https://github.com/sigstore/cosign/releases/download/v{{ cosign_version }}/cosign-linux-amd64"
        dest: /usr/local/bin/cosign
        mode: "0755"

    - name: Verificar instalacao do Cosign
      ansible.builtin.command: cosign version
      changed_when: false
