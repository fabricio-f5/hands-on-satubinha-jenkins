---
# =============================================================================
# Role: ecr_build_push
#
# Fluxo:
#   1. Autentica no ECR via Instance Profile
#   2. Procura a tag mais recente no formato vX.Y-<sha>-stable no ECR
#      a. Se existe → define jenkins_image_tag=<tag_stable>, skip build
#      b. Se nao existe → calcula nova tag:
#           - Versao semantica: jenkins_image_version (definida em all.yml)
#           - SHA: short commit hash do repo satubinha-jenkins
#           - Tag final: vX.Y-<sha>
#         e executa build completo:
#           i.   Git clone
#           ii.  Docker build com nova tag
#           iii. Trivy scan
#           iv.  Container Structure Test
#           v.   Docker push
#           vi.  Cosign sign
#         (a promocao para stable e feita pelo role jenkins apos healthcheck)
# =============================================================================

# -----------------------------------------------------------------------------
# Instalar Git
# -----------------------------------------------------------------------------

- name: Instalar git
  ansible.builtin.apt:
    name: git
    state: present
    update_cache: true

# -----------------------------------------------------------------------------
# Autenticacao ECR via Instance Profile
# -----------------------------------------------------------------------------

- name: Autenticar no ECR via Instance Profile
  ansible.builtin.shell: |
    set -o pipefail
    aws ecr get-login-password --region {{ aws_region }} | \
    docker login --username AWS --password-stdin {{ ecr_registry }}
  args:
    executable: /bin/bash
  changed_when: true

# -----------------------------------------------------------------------------
# Procurar tag stable mais recente no ECR
# Formato esperado: vX.Y-<sha>-stable
# -----------------------------------------------------------------------------

- name: Listar todas as tags stable no ECR
  ansible.builtin.shell: |
    python3 -c "
    import subprocess, json, re

    result = subprocess.run([
        'aws', 'ecr', 'describe-images',
        '--region', '{{ aws_region }}',
        '--repository-name', '{{ ecr_repo_name }}',
        '--query', 'imageDetails[*].imageTags[*]',
        '--output', 'json'
    ], capture_output=True, text=True)

    if result.returncode != 0 or not result.stdout.strip():
        print('')
    else:
        tags = json.loads(result.stdout)
        flat = [t for sub in tags for t in (sub or [])]
        stable = [t for t in flat if re.match(r'^v\d+\.\d+-[a-f0-9]+-stable$', t)]

        def parse_version(tag):
            m = re.match(r'^v(\d+)\.(\d+)-[a-f0-9]+-stable$', tag)
            return (int(m.group(1)), int(m.group(2))) if m else (0, 0)

        if stable:
            latest = max(stable, key=parse_version)
            print(latest)
        else:
            print('')
    "
  register: ecr_stable_tag
  changed_when: false

- name: Verificar assinatura Cosign da tag stable encontrada
  ansible.builtin.shell: |
    cosign verify \
      --key {{ cosign_pub_key_path }} \
      {{ ecr_repository }}:{{ ecr_stable_tag.stdout | trim }} 2>/dev/null \
      && echo "SIGNED" || echo "NOT_SIGNED"
  register: cosign_stable_check
  changed_when: false
  failed_when: false
  when: ecr_stable_tag.stdout | trim != ''

- name: Definir se stable esta disponivel e valida
  ansible.builtin.set_fact:
    stable_available: >-
      {{
        ecr_stable_tag.stdout | trim != '' and
        'SIGNED' in (cosign_stable_check.stdout | default('NOT_SIGNED'))
      }}

- name: Log — estado da tag stable
  ansible.builtin.debug:
    msg: >-
      Tag stable:
      {% if stable_available %}encontrada ({{ ecr_stable_tag.stdout | trim }}) e assinada — skip build
      {% else %}nao existe ou nao assinada — build necessario{% endif %}

# -----------------------------------------------------------------------------
# Se stable existe → usar directamente (skip build)
# -----------------------------------------------------------------------------

- name: Definir jenkins_image_tag como stable encontrada (sem build)
  ansible.builtin.set_fact:
    jenkins_image_tag: "{{ ecr_stable_tag.stdout | trim }}"
    needs_build: false
  when: stable_available

# -----------------------------------------------------------------------------
# Se stable nao existe → calcular nova tag e buildar
# -----------------------------------------------------------------------------

- name: Git clone do repositorio para obter o SHA
  ansible.builtin.git:
    repo: "{{ jenkins_repo_url }}"
    dest: /opt/jenkins-build/repo
    version: "{{ jenkins_repo_branch }}"
    force: true
  when: not stable_available

- name: Obter short SHA do commit
  ansible.builtin.command:
    cmd: git rev-parse --short HEAD
    chdir: /opt/jenkins-build/repo
  register: git_short_sha
  changed_when: false
  when: not stable_available

- name: Calcular nova tag (vX.Y-<sha>)
  ansible.builtin.set_fact:
    jenkins_image_tag: "{{ jenkins_image_version }}-{{ git_short_sha.stdout | trim }}"
    needs_build: true
  when: not stable_available

- name: Log — nova tag calculada
  ansible.builtin.debug:
    msg: "Nova tag calculada: {{ jenkins_image_tag }}"
  when: not stable_available

# -----------------------------------------------------------------------------
# Build
# -----------------------------------------------------------------------------

- name: Criar directorio de trabalho para o build
  ansible.builtin.file:
    path: /opt/jenkins-build
    state: directory
    mode: "0755"
  when: needs_build

- name: Docker build da imagem Jenkins
  ansible.builtin.shell: |
    docker build \
      -t {{ ecr_repository }}:{{ jenkins_image_tag }} \
      /opt/jenkins-build/repo/jenkins/
  register: docker_build_result
  changed_when: true
  when: needs_build

# -----------------------------------------------------------------------------
# Trivy scan
# -----------------------------------------------------------------------------

- name: Verificar se Trivy ja esta instalado
  ansible.builtin.command: trivy --version
  register: trivy_check
  failed_when: false
  changed_when: false
  when: needs_build

- name: Download script de instalacao do Trivy
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh
    dest: /tmp/trivy-install.sh
    mode: "0755"
  when: needs_build and trivy_check.rc != 0

- name: Instalar Trivy
  ansible.builtin.command: /tmp/trivy-install.sh -b /usr/local/bin
  when: needs_build and trivy_check.rc != 0
  changed_when: true

- name: Remover script de instalacao do Trivy
  ansible.builtin.file:
    path: /tmp/trivy-install.sh
    state: absent
  when: needs_build and trivy_check.rc != 0

- name: Copiar .trivyignore para o EC2
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../jenkins/.trivyignore"
    dest: /tmp/.trivyignore
    mode: "0644"
  when: needs_build

- name: Trivy scan da imagem — falha em CVEs CRITICAL sem justificacao
  ansible.builtin.shell: |
    trivy image \
      --exit-code 1 \
      --severity CRITICAL \
      --no-progress \
      --ignore-unfixed \
      --ignorefile /tmp/.trivyignore \
      {{ ecr_repository }}:{{ jenkins_image_tag }}
  register: trivy_result
  changed_when: false
  when: needs_build

- name: Log — Trivy scan passou
  ansible.builtin.debug:
    msg: "Trivy scan concluido sem CVEs CRITICAL — {{ jenkins_image_tag }}"
  when: needs_build

# -----------------------------------------------------------------------------
# Container Structure Test
# -----------------------------------------------------------------------------

- name: Verificar se container-structure-test ja esta instalado
  ansible.builtin.command: container-structure-test version
  register: cst_check
  failed_when: false
  changed_when: false
  when: needs_build

- name: Instalar container-structure-test
  ansible.builtin.get_url:
    url: "https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-amd64"
    dest: /usr/local/bin/container-structure-test
    mode: "0755"
  when: needs_build and cst_check.rc != 0

- name: Container Structure Test da imagem Jenkins
  ansible.builtin.shell: |
    container-structure-test test \
      --image {{ ecr_repository }}:{{ jenkins_image_tag }} \
      --config /opt/jenkins-build/repo/jenkins/container-structure-test.yaml
  register: cst_result
  changed_when: false
  when: needs_build

- name: Log — Container Structure Test passou
  ansible.builtin.debug:
    msg: "Container Structure Test concluido com sucesso — {{ jenkins_image_tag }}"
  when: needs_build

# -----------------------------------------------------------------------------
# Docker push
# -----------------------------------------------------------------------------

- name: Docker push para ECR
  ansible.builtin.shell: |
    docker push {{ ecr_repository }}:{{ jenkins_image_tag }}
  register: docker_push_result
  changed_when: true
  when: needs_build

# -----------------------------------------------------------------------------
# Cosign sign
# -----------------------------------------------------------------------------

- name: Buscar chave privada Cosign do Secrets Manager
  ansible.builtin.shell: |
    aws secretsmanager get-secret-value \
      --region {{ aws_region }} \
      --secret-id {{ cosign_secret_name }} \
      --query SecretString \
      --output text > /tmp/cosign.key
    chmod 600 /tmp/cosign.key
  changed_when: true
  when: needs_build
  no_log: true

- name: Obter digest da imagem apos push
  ansible.builtin.shell: |
    docker inspect \
      --format='{% raw %}{{index .RepoDigests 0}}{% endraw %}' \
      {{ ecr_repository }}:{{ jenkins_image_tag }}
  register: image_digest
  changed_when: false
  when: needs_build

- name: Assinar imagem com Cosign
  ansible.builtin.shell: |
    COSIGN_PASSWORD="" cosign sign \
      --key /tmp/cosign.key \
      --yes \
      {{ image_digest.stdout }}
  changed_when: true
  when: needs_build
  no_log: true

- name: Remover chave privada Cosign do disco
  ansible.builtin.file:
    path: /tmp/cosign.key
    state: absent
  when: needs_build

# -----------------------------------------------------------------------------
# Limpar contexto de build
# -----------------------------------------------------------------------------

- name: Remover directorio de build
  ansible.builtin.file:
    path: /opt/jenkins-build
    state: absent
  when: needs_build
