---
# Jenkins Configuration as Code (JCasC)
# Toda a configuracao do Jenkins e declarativa aqui — zero cliques na UI
# Doc: https://plugins.jenkins.io/configuration-as-code/

jenkins:
  systemMessage: "Jenkins — hands-on-satubinha | Gerido por JCasC"
  numExecutors: 2
  mode: NORMAL
  scmCheckoutRetryCount: 2

  # Seguranca — autenticacao local com admin criado via variavel de ambiente
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER}"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  # Agente built-in no proprio EC2
  remotingSecurity:
    enabled: true

unclassified:
  # URL publica do Jenkins — necessaria para os webhooks do GitHub
  location:
    url: "http://${JENKINS_PUBLIC_IP}:8080/"
    adminAddress: "admin@satubinha.lab"

  # Prefixo de timestamper nos logs do pipeline
  timestamper:
    allPipelines: true

  # Cor nos logs (plugin ansicolor)
  ansiColorBuildWrapper:
    globalColorMapName: "xterm"

jobs:
  # -------------------------------------------------------------------------
  # Pipeline — layer foundation (network + security-group)
  # -------------------------------------------------------------------------
  - script: |
      pipelineJob('satubinha-foundation') {
        description('Layer foundation — network + security-group | dev')
        keepDependencies(false)
        properties {
          githubProjectUrl('https://github.com/fabricio-f5/hands-on-satubinha-iac-terragrunt/')
          buildDiscarder {
            strategy {
              logRotator {
                numToKeepStr('10')
                artifactNumToKeepStr('')
              }
            }
          }
        }
        triggers {
          githubPush()
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/fabricio-f5/hands-on-satubinha-jenkins.git')
                }
                branches('*/master')
                extensions {}
              }
            }
            scriptPath('pipelines/Jenkinsfile.foundation')
            lightweight(true)
          }
        }
      }

  # -------------------------------------------------------------------------
  # Pipeline — layer ec2
  # -------------------------------------------------------------------------
  - script: |
      pipelineJob('satubinha-ec2') {
        description('Layer ec2 | dev — depende da layer foundation')
        keepDependencies(false)
        properties {
          githubProjectUrl('https://github.com/fabricio-f5/hands-on-satubinha-iac-terragrunt/')
          buildDiscarder {
            strategy {
              logRotator {
                numToKeepStr('10')
                artifactNumToKeepStr('')
              }
            }
          }
        }
        triggers {
          githubPush()
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/fabricio-f5/hands-on-satubinha-jenkins.git')
                }
                branches('*/master')
                extensions {}
              }
            }
            scriptPath('pipelines/Jenkinsfile.ec2')
            lightweight(true)
          }
        }
      }
